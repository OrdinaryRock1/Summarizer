<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Shrnutí | Editorial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <style>
 
        :root {
            --bg-color: #Faf9f6; 
            --text-color: #1a1a1a;
            --accent-color: #8b0000; 
            --border-color: #e0ddcf;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        /* Úzký sloupec pro skvělou čitelnost */
        .container {
            max-width: 680px;
            width: 100%;
            padding: 4rem 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
        }

        /* Minimalistický formulář */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        input[type="text"] {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--text-color);
            padding: 0.5rem 0;
            font-size: 1.2rem;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            border-bottom-color: var(--accent-color);
        }

        input[type="text"]::placeholder {
            color: #999;
        }

        button {
            background-color: var(--text-color);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background-color 0.3s ease;
            align-self: flex-start;
        }

        button:hover {
            background-color: var(--accent-color);
        }

        /* Stylování výsledného článku */
        #result-section {
            display: none; /* Skryto na začátku */
            animation: fadeIn 0.8s ease-in;
        }

        .article-meta {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 0.5rem 0;
        }

        h2.summary-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-top: 0;
        }

        .drop-cap:first-letter {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            float: left;
            line-height: 0.8;
            margin-right: 0.5rem;
            margin-top: 0.2rem;
            color: var(--text-color);
        }

        /* Loading animace */
        #loading {
            display: none;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            text-align: center;
            font-size: 1.2rem;
            color: #666;
            margin: 3rem 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="subtitle">AI Zpravodaj</div>
            <h1>Video Sumarizátor</h1>
        </header>

        <main>
            <div class="form-group">
                <input type="text" id="video-url" placeholder="Vložte odkaz na YouTube video...">
                <button id="summarize-btn">Vytvořit shrnutí</button>
            </div>

            <div id="loading">Čtu přepis a připravuji vydání...</div>

            <article id="result-section">
                <div class="article-meta">
                    <span>Zdroj: YouTube</span>
                    <span>Vygenerováno AI</span>
                </div>
                <h2 class="summary-title" id="summary-title">Shrnutí obsahu</h2>
                <button id="download-btn" style="display: none; margin-bottom: 2rem; background-color: #333; font-size: 0.8rem;">Uložit jako .TXT</button>
                <div id="summary-content">
                    </div>
            </article>
        </main>
    </div>

    <script>
        document.getElementById('summarize-btn').addEventListener('click', async function() {
    const urlInput = document.getElementById('video-url').value;
    const loading = document.getElementById('loading');
    const resultSection = document.getElementById('result-section');
    const summaryContent = document.getElementById('summary-content');

    if (!urlInput) {
        alert('Prosím, vložte URL adresu videa.');
        return;
    }

    resultSection.style.display = 'none';
    loading.style.display = 'block';

    try {
        const response = await fetch('https://summarizer-d255.onrender.com/api/sumarizovat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ url: urlInput })
        });

        const data = await response.json();

        loading.style.display = 'none';

        if (response.ok) {
            let formatedText = data.summary
                .split('\n')
                .filter(paragraph => paragraph.trim() !== '')
                .map(paragraph => `<p>${paragraph}</p>`)
                .join('');
            
            formatedText = formatedText.replace('<p>', '<p class="drop-cap">');

            summaryContent.innerHTML = formatedText;
            resultSection.style.display = 'block';
            document.getElementById('download-btn').style.display = 'block';
        } else {
            summaryContent.innerHTML = `<p style="color: red;">Nastala chyba: ${data.error}</p>`;
            resultSection.style.display = 'block';
        }

    } catch (error) {
        loading.style.display = 'none';
        summaryContent.innerHTML = `<p style="color: red;">Chyba připojení. Běží Python server?</p>`;
        resultSection.style.display = 'block';
    }
    });


    document.getElementById('download-btn').addEventListener('click', function() {
        const textKeStazeni = document.getElementById('summary-content').innerText;
        

        const blob = new Blob([textKeStazeni], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = 'AI-shrnuti-videa.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
    </script>

</body>
</html>
